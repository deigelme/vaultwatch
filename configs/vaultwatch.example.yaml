# VaultWatch example configuration
# Copy this file to vaultwatch.yaml and adjust to your environment.

vault:
  # Address of the Vault server (required)
  address: "https://vault.example.com"

  # Vault token used for authentication.
  # Prefer setting VAULT_TOKEN in the environment instead.
  # token: "s.xxxxxxxxxxxxxxxxxxxx"

  # Paths of secrets to monitor (required, at least one)
  secret_paths:
    - "secret/data/db/password"
    - "secret/data/api/key"
    - "secret/data/tls/cert"

# How often VaultWatch polls Vault for secret metadata.
# Accepts Go duration strings: 1h, 30m, etc. Default: 1h
interval: "1h"

alerts:
  # Print alerts to stdout (always enabled in addition to other notifiers)
  stdout: true

  # Email notifications via SMTP
  email:
    enabled: false
    smtp_host: "smtp.example.com"
    smtp_port: 587
    from: "vaultwatch@example.com"
    to:
      - "ops@example.com"

  # Slack incoming webhook
  slack:
    enabled: false
    webhook_url: "https://hooks.slack.com/services/T000/B000/xxxx"

  # Generic JSON webhook
  webhook:
    enabled: false
    url: "https://hooks.example.com/vaultwatch"

  # PagerDuty Events API v2
  pagerduty:
    enabled: false
    integration_key: "your-pagerduty-routing-key"

  # OpsGenie Alerts API
  opsgenie:
    enabled: false
    api_key: "your-opsgenie-api-key"

  # Microsoft Teams incoming webhook
  teams:
    enabled: false
    webhook_url: "https://outlook.office.com/webhook/xxx"

  # Discord webhook
  discord:
    enabled: false
    webhook_url: "https://discord.com/api/webhooks/xxx/yyy"

  # Telegram Bot API
  telegram:
    enabled: false
    bot_token: "123456:ABC-DEF"
    chat_id: "-100123456789"

  # Jira issue creation
  jira:
    enabled: false
    base_url: "https://yourorg.atlassian.net"
    username: "bot@yourorg.com"
    api_token: "your-jira-api-token"
    project_key: "OPS"
    issue_type: "Task"
