# VaultWatch example configuration
# Copy to vaultwatch.yaml and adjust values for your environment.

vault:
  # Address of the Vault server (required)
  address: "https://vault.example.com:8200"

  # Vault token (can also be set via VAULT_TOKEN env var)
  token: "${VAULT_TOKEN}"

  # Optional: path to CA certificate for TLS verification
  # ca_cert: "/etc/ssl/certs/vault-ca.pem"

  # Optional: skip TLS verification (not recommended for production)
  # tls_skip_verify: false

# Secrets to monitor
secrets:
  - path: "secret/data/database/prod"
    # Field inside the secret that holds the expiry timestamp (RFC3339)
    expiry_field: "expires_at"

  - path: "secret/data/api/stripe"
    expiry_field: "rotation_deadline"

  - path: "secret/data/tls/cert"
    expiry_field: "not_after"

# How often to poll Vault for secret metadata
interval: "5m"

# Alert thresholds — alerts fire when time-to-expiry falls below these values
thresholds:
  warning:  "72h"
  critical: "24h"

# Alert history deduplication — suppress duplicate alerts for this long
history_ttl: "6h"

# Notifiers — one or more destinations for alerts
alerts:
