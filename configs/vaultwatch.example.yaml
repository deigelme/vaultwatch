# vaultwatch example configuration
# Copy this file to vaultwatch.yaml and adjust as needed.

vault:
  address: "https://vault.example.com"
  token: "s.XXXXXXXXXXXXXXXXXXXX"
  # Optional: path to a CA certificate for TLS verification
  # ca_cert: "/etc/ssl/certs/vault-ca.pem"

# Paths to monitor. Each entry is a KV secret path.
secret_paths:
  - "secret/data/db/password"
  - "secret/data/api/key"
  - "secret/data/tls/cert"

# How often to check for expiring secrets (e.g. 1h, 30m, 24h)
check_interval: "1h"

# Alert thresholds — alerts fire when time-to-expiry falls below these values.
thresholds:
  warning:  "72h"
  critical: "24h"

alerts:
  stdout:
    enabled: true

  email:
    enabled: false
    smtp_host: "smtp.example.com"
    smtp_port: 587
    from: "vaultwatch@example.com"
    to:
      - "ops@example.com"
    username: "vaultwatch@example.com"
    password: "secret"

  slack:
    enabled: false
    webhook_url: "https://hooks.slack.com/services/XXX/YYY/ZZZ"

  pagerduty:
    enabled: false
    integration_key: "your-pagerduty-integration-key"

  opsgenie:
    enabled: false
    api_key: "your-opsgenie-api-key"

  teams:
    enabled: false
    webhook_url: "https://outlook.office.com/webhook/XXX"

  discord:
    enabled: false
    webhook_url: "https://discord.com/api/webhooks/XXX/YYY"

  telegram:
    enabled: false
    bot_token: "your-telegram-bot-token"
    chat_id: "your-chat-id"

  webhook:
    enabled: false
    url: "https://your-webhook-endpoint.example.com/alert"

  victorops:
    enabled: false
    routing_url: "https://alert.victorops.com/integrations/XXX"

  datadog:
    enabled: false
    api_key: "your-datadog-api-key"

  splunk:
    enabled: false
    hec_url: "https://splunk.example.com:8088/services/collector"
    token: "your-splunk-hec-token"

  newrelic:
    enabled: false
    account_id: "your-account-id"
    api_key: "your-newrelic-api-key"

  jira:
    enabled: false
    base_url: "https://yourorg.atlassian.net"
    username: "jira-user@example.com"
    api_token: "your-jira-api-token"
    project_key: "OPS"

  servicenow:
    enabled: false
    base_url: "https://yourinstance.service-now.com"
    username: "admin"
    password: "secret"

  pagertree:
    enabled: false
    integration_url: "https://api.pagertree.com/integration/XXX"
