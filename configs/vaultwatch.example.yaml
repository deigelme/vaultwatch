# VaultWatch example configuration
# Copy this file to vaultwatch.yaml and adjust as needed.

vault_address: "https://vault.example.com"
vault_token: "s.XXXXXXXXXXXXXXXXXXXX"

# Paths to monitor. Each entry is a KV v2 secret path.
secret_paths:
  - "secret/data/myapp/db"
  - "secret/data/myapp/api-key"
  - "secret/data/platform/tls-cert"

# How often to poll Vault for secret metadata.
check_interval: "1h"

# Alert thresholds. Alerts fire when time-to-expiry falls below these values.
alert_thresholds:
  warning:  "72h"
  critical: "24h"

# Notifiers — enable one or more.
notifiers:

  # Print alerts to stdout (always useful for debugging).
  stdout:
    enabled: true

  # Send email via SMTP.
  email:
    enabled: false
    smtp_host: "smtp.example.com"
    smtp_port: 587
    username: "alerts@example.com"
    password: "secret"
    from: "alerts@example.com"
    to:
      - "ops@example.com"

  # Post to a Slack channel via incoming webhook.
  slack:
    enabled: false
    webhook_url: "https://hooks.slack.com/services/XXX/YYY/ZZZ"

  # Generic outbound webhook (JSON POST).
  webhook:
    enabled: false
    url: "https://hooks.example.com/vaultwatch"

  # PagerDuty Events API v2.
  pagerduty:
    enabled: false
    integration_key: "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"

  # OpsGenie Alerts API.
  opsgenie:
    enabled: false
    api_key: "XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX"

  # Microsoft Teams incoming webhook.
  teams:
    enabled: false
    webhook_url: "https://outlook.office.com/webhook/XXX"

  # Discord channel webhook.
  discord:
    enabled: false
    webhook_url: "https://discord.com/api/webhooks/XXX/YYY"

  # Telegram bot.
  telegram:
    enabled: false
    bot_token: "123456789:XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
    chat_id: "-1001234567890"

  # AWS SNS topic.
  sns:
    enabled: false
    topic_arn: "arn:aws:sns:us-east-1:123456789012:vaultwatch"
    region: "us-east-1"

  # Gotify (self-hosted push notifications).
  gotify:
    enabled: false
    base_url: "https://gotify.example.com"
    token: "XXXXXXXXXXXX"
