# vaultwatch example configuration
# Copy to vaultwatch.yaml and adjust to your environment.

vault:
  # Address of the Vault server (required).
  address: "https://vault.example.com"

  # Vault token used for authentication.
  # Prefer VAULT_TOKEN env var in production.
  token: "s.XXXXXXXXXXXX"

  # TLS settings (optional).
  # tls_skip_verify: false
  # ca_cert: /etc/ssl/vault-ca.pem

# Secrets to monitor (at least one path required).
secrets:
  - path: "secret/data/myapp/database"
    # Override the global warning/critical thresholds for this secret.
    # warn_before:     72h
    # critical_before: 24h

  - path: "secret/data/myapp/api-key"

  - path: "pki/cert/web"

# How often VaultWatch polls Vault for secret metadata.
# Accepts Go duration strings: 30s, 5m, 1h, etc.
check_interval: 5m

# Alert thresholds (global defaults).
warn_before:     72h
critical_before: 24h

alerts:
  # ── stdout ────────────────────────────────────────────────────────────────
  - type: stdout

  # ── email ─────────────────────────────────────────────────────────────────
  - type: email
    smtp_host: smtp.example.com
    smtp_port: 587
    username:  alerts@example.com
    password:  secret
    from:      alerts@example.com
    to:
      - oncall@example.com

  # ── Slack ─────────────────────────────────────────────────────────────────
  - type: slack
    webhook_url: "https://hooks.slack.com/services/T000/B000/XXXX"

  # ── generic webhook ───────────────────────────────────────────────────────
  - type: webhook
    url: "https://ingest.example.com/vaultwatch"

  # ── PagerDuty ─────────────────────────────────────────────────────────────
  - type: pagerduty
    integration_key: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

  # ── OpsGenie ──────────────────────────────────────────────────────────────
  - type: opsgenie
    api_key: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

  # ── Microsoft Teams ───────────────────────────────────────────────────────
  - type: teams
    webhook_url: "https://outlook.office.com/webhook/..."

  # ── Discord ───────────────────────────────────────────────────────────────
  - type: discord
    webhook_url: "https://discord.com/api/webhooks/000/XXXX"

  # ── Telegram ──────────────────────────────────────────────────────────────
  - type: telegram
    bot_token: "123456:ABC-DEF"
    chat_id:   "-100123456789"

  # ── AWS SNS ───────────────────────────────────────────────────────────────
  - type: sns
    topic_arn: "arn:aws:sns:us-east-1:123456789012:vaultwatch"
    region:    "us-east-1"

  # ── VictorOps ─────────────────────────────────────────────────────────────
  - type: victorops
    webhook_url: "https://alert.victorops.com/integrations/generic/..."

  # ── Syslog ────────────────────────────────────────────────────────────────
  - type: syslog
    network:  udp
    address:  "localhost:514"
    tag:      vaultwatch

  # ── Mattermost ────────────────────────────────────────────────────────────
  - type: mattermost
    webhook_url: "https://mattermost.example.com/hooks/XXXX"

  # ── Google Chat ───────────────────────────────────────────────────────────
  - type: googlechat
    webhook_url: "https://chat.googleapis.com/v1/spaces/.../messages?key=..."

  # ── Datadog ───────────────────────────────────────────────────────────────
  - type: datadog
    api_key: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

  # ── Splunk HEC ────────────────────────────────────────────────────────────
  - type: splunk
    hec_url:   "https://splunk.example.com:8088/services/collector"
    hec_token: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

  # ── New Relic ─────────────────────────────────────────────────────────────
  - type: newrelic
    account_id: "1234567"
    api_key:    "NRAK-XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"

  # ── Zenduty ───────────────────────────────────────────────────────────────
  - type: zenduty
    api_key: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

  # ── Alertmanager ──────────────────────────────────────────────────────────
  - type: alertmanager
    endpoint: "http://alertmanager.example.com:9093"

  # ── Jira ──────────────────────────────────────────────────────────────────
  - type: jira
    base_url:    "https://yourorg.atlassian.net"
    username:    jira-bot@example.com
    api_token:   "ATATT3xFfGF0..."
    project_key: OPS

  # ── ServiceNow ────────────────────────────────────────────────────────────
  - type: servicenow
    base_url:  "https://yourinstance.service-now.com"
    username:  vaultwatch
    password:  secret

  # ── Rocket.Chat ───────────────────────────────────────────────────────────
  - type: rocketchat
    webhook_url: "https://rocketchat.example.com/hooks/XXXX"

  # ── Signal Sciences ───────────────────────────────────────────────────────
  - type: signalsciences
    corp_name:  mycorp
    site_name:  mysite
    api_token:  "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

  # ── Gotify ────────────────────────────────────────────────────────────────
  - type: gotify
    base_url: "https://gotify.example.com"
    token:    "XXXXXXXXXXXX"

  # ── Matrix ────────────────────────────────────────────────────────────────
  - type: matrix
    homeserver: "https://matrix.example.com"
    token:      "syt_XXXXXXXXXXXX"
    room_id:    "!roomid:example.com"

  # ── Zulip ─────────────────────────────────────────────────────────────────
  - type: zulip
    base_url: "https://yourorg.zulipchat.com"
    bot_email: vaultwatch-bot@yourorg.zulipchat.com
    api_key:   "XXXXXXXXXXXX"
    stream:    "ops-alerts"
    topic:     "vault expiry"

  # ── Pushover ──────────────────────────────────────────────────────────────
  - type: pushover
    app_token: "XXXXXXXXXXXX"
    user_key:  "XXXXXXXXXXXX"

  # ── Lark / Feishu ─────────────────────────────────────────────────────────
  - type: lark
    webhook_url: "https://open.feishu.cn/open-apis/bot/v2/hook/XXXX"

  # ── PagerTree ─────────────────────────────────────────────────────────────
  - type: pagertree
    webhook_url: "https://pagertree.com/api/v3/signal/XXXX"

  # ── Linear ────────────────────────────────────────────────────────────────
  - type: linear
    api_key: "lin_api_XXXXXXXXXXXX"
    team_id: "TEAM-UUID"

  # ── HTTP GET ──────────────────────────────────────────────────────────────
  - type: httpget
    url: "https://healthcheck.example.com/ping/XXXX"

  # ── Grafana ───────────────────────────────────────────────────────────────
  - type: grafana
    url:    "https://grafana.example.com/api/annotations"
    api_key: "glsa_XXXXXXXXXXXX"

  # ── Campfire ──────────────────────────────────────────────────────────────
  - type: campfire
    account_id:  "yourorg"
    campfire_id: "123456"
    token:       "XXXXXXXXXXXX"

  # ── ntfy ──────────────────────────────────────────────────────────────────
  - type: ntfy
    base_url: "https://ntfy.sh"
    topic:    "vaultwatch"

  # ── BearyChat ─────────────────────────────────────────────────────────────
  - type: bearychat
    webhook_url: "https://hook.bearychat.com/incomingHook/XXXX"

  # ── SIGNL4 ────────────────────────────────────────────────────────────────
  - type: signl4
    webhook_url: "https://connect.signl4.com/webhook/XXXX"

  # ── Google Cloud Pub/Sub ──────────────────────────────────────────────────
  - type: googlepubsub
    project_id: my-gcp-project
    topic_id:   vaultwatch-alerts
