# VaultWatch example configuration
# Copy to vaultwatch.yaml and adjust to your environment.

vault_address: "https://vault.example.com:8200"
vault_token: "s.XXXXXXXXXXXXXXXX"

# Paths to monitor (KV v2 metadata paths)
secret_paths:
  - "secret/data/myapp/db"
  - "secret/data/myapp/api-key"
  - "secret/data/infra/tls-cert"

# How often to check for expiring secrets (default: 1h)
check_interval: "1h"

# Alert thresholds — alerts fire when time-to-expiry falls within these windows
thresholds:
  critical: "24h"
  warning: "72h"
  info: "168h" # 7 days

# Notifiers — configure one or more
notifiers:
  stdout:
    enabled: true

  email:
    enabled: false
    smtp_host: "smtp.example.com"
    smtp_port: 587
    from: "vaultwatch@example.com"
    to:
      - "ops@example.com"

  slack:
    enabled: false
    webhook_url: "https://hooks.slack.com/services/XXX/YYY/ZZZ"

  discord:
    enabled: false
    webhook_url: "https://discord.com/api/webhooks/XXX/YYY"

  telegram:
    enabled: false
    bot_token: "123456:ABC-DEF..."
    chat_id: "-100123456789"

  webhook:
    enabled: false
    url: "https://example.com/hooks/vaultwatch"

  pagerduty:
    enabled: false
    integration_key: "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"

  opsgenie:
    enabled: false
    api_key: "XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX"

  teams:
    enabled: false
    webhook_url: "https://outlook.office.com/webhook/XXX"
