# vaultwatch example configuration
# Copy this file to vaultwatch.yaml and adjust to your environment.

vault:
  # Address of your Vault server (required)
  address: "https://vault.example.com:8200"

  # Vault token (or use VAULT_TOKEN env var)
  token: ""

  # TLS settings
  tls_skip_verify: false

  # Paths to KV secrets to monitor (required, at least one)
  secret_paths:
    - "secret/data/database/prod"
    - "secret/data/api/stripe"
    - "secret/data/tls/cert"

# How often to poll Vault for expiration data (default: 1h)
check_interval: "1h"

# Alert thresholds — fire alerts when time-to-expiry falls below these values
thresholds:
  critical: "24h"   # fire CRITICAL alert
  warning:  "72h"   # fire WARNING alert
  info:     "168h"  # fire INFO alert (7 days)

# Alerting channels — enable one or more
alerts:
  stdout:
    enabled: true

  email:
    enabled: false
    smtp_host: "smtp.example.com"
    smtp_port: 587
    from: "vaultwatch@example.com"
    to:
      - "ops@example.com"
    username: ""
    password: ""

  slack:
    enabled: false
    webhook_url: "https://hooks.slack.com/services/XXX/YYY/ZZZ"

  pagerduty:
    enabled: false
    integration_key: ""

  opsgenie:
    enabled: false
    api_key: ""

  teams:
    enabled: false
    webhook_url: ""

  discord:
    enabled: false
    webhook_url: ""

  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""

  victorops:
    enabled: false
    webhook_url: ""

  mattermost:
    enabled: false
    webhook_url: ""
    channel: ""
    username: "vaultwatch"

  googlechat:
    enabled: false
    webhook_url: ""

  datadog:
