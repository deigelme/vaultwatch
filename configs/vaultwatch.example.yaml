# VaultWatch example configuration
# Copy this file to vaultwatch.yaml and adjust to your environment.

# vault section configures the HashiCorp Vault connection.
vault:
  # address is the URL of your Vault server.
  address: "https://vault.example.com"

  # token is a Vault token with read access to the monitored paths.
  # Prefer setting VAULT_TOKEN in the environment instead.
  token: ""

  # tls_skip_verify disables TLS certificate verification (not recommended for production).
  tls_skip_verify: false

# secrets lists the Vault secret paths to monitor.
secrets:
  - path: "secret/data/myapp/db"
  - path: "secret/data/myapp/api-key"
  - path: "pki/cert/my-cert"

# interval is how often VaultWatch polls Vault for secret metadata.
# Accepts Go duration strings: e.g. "5m", "1h", "30s".
interval: "5m"

# thresholds define when alerts are fired based on time remaining until expiry.
thresholds:
  warning:  "72h"   # 3 days
  critical: "24h"   # 1 day

# notifiers configures one or more alert destinations.
# All enabled notifiers receive every alert.
notifiers:

  # stdout prints alerts to standard output (always useful for debugging).
  stdout:
    enabled: true

  # email sends alerts via SMTP.
  email:
    enabled: false
    smtp_host: "smtp.example.com"
    smtp_port: 587
    from: "vaultwatch@example.com"
    to:
      - "ops@example.com"
    username: ""
    password: ""

  # slack sends alerts to a Slack channel via incoming webhook.
  slack:
    enabled: false
    webhook_url: "https://hooks.slack.com/services/XXX/YYY/ZZZ"

  # webhook sends a JSON POST to an arbitrary HTTP endpoint.
  webhook:
    enabled: false
    url: "https://example.com/vaultwatch-alert"

  # pagerduty sends alerts to PagerDuty via the Events API v2.
  pagerduty:
    enabled: false
    integration_key: "your-pagerduty-integration-key"

  # opsgenie sends alerts to OpsGenie.
  opsgenie:
    enabled: false
    api_key: "your-opsgenie-api-key"

  # teams sends alerts to Microsoft Teams via incoming webhook.
  teams:
    enabled: false
    webhook_url: "https://outlook.office.com/webhook/..."

  # discord sends alerts to a Discord channel via webhook.
  discord:
    enabled: false
    webhook_url: "https://discord.com/api/webhooks/..."

  # telegram sends alerts via the Telegram Bot API.
  telegram:
    enabled: false
    bot_token: "your-telegram-bot-token"
    chat_id: "your-chat-id"

  # sns publishes alerts to an AWS SNS topic.
  sns:
    enabled: false
    topic_arn: "arn:aws:sns:us-east-1:123456789012:vaultwatch"
    region: "us-east-1"

  # victorops sends alerts to VictorOps (Splunk On-Call).
  victorops:
    enabled: false
    webhook_url: "https://alert.victorops.com/integrations/..."

  # syslog writes alerts to the local syslog daemon.
  syslog:
    enabled: false
    tag: "vaultwatch"

  # mattermost sends alerts to a Mattermost channel via incoming webhook.
  mattermost:
    enabled: false
    webhook_url: "https://mattermost.example.com/hooks/..."

  # googlechat sends alerts to a Google Chat space via incoming webhook.
  googlechat:
    enabled: false
    webhook_url: "https://chat.googleapis.com/v1/spaces/.../messages?key=...&token=..."

  # datadog sends events to Datadog.
  datadog:
    enabled: false
    api_key: "your-datadog-api-key"

  # splunk sends alerts to Splunk HTTP Event Collector.
  splunk:
    enabled: false
    url: "https://splunk.example.com:8088/services/collector"
    token: "your-hec-token"

  # newrelic sends custom events to New Relic.
  newrelic:
    enabled: false
    account_id: "your-account-id"
    api_key: "your-insert-api-key"

  # zenduty sends alerts to Zenduty.
  zenduty:
    enabled: false
    api_key: "your-zenduty-api-key"

  # alertmanager pushes alerts to a Prometheus Alertmanager instance.
  alertmanager:
    enabled: false
    endpoint: "http://alertmanager.example.com:9093"

  # jira creates Jira issues for expiring secrets.
  jira:
    enabled: false
    base_url: "https://yourorg.atlassian.net"
    username: "bot@example.com"
    api_token: "your-jira-api-token"
    project_key: "OPS"

  # servicenow creates ServiceNow incidents.
  servicenow:
    enabled: false
    base_url: "https://yourinstance.service-now.com"
    username: "admin"
    password: "your-password"

  # rocketchat sends alerts to a Rocket.Chat channel via webhook.
  rocketchat:
    enabled: false
    webhook_url: "https://rocketchat.example.com/hooks/..."

  # signalsciences sends custom events to Signal Sciences (Fastly Next-Gen WAF).
  signalsciences:
    enabled: false
    corp_name: "your-corp"
    site_name: "your-site"
    api_token: "your-api-token"

  # gotify sends push notifications via a self-hosted Gotify server.
  gotify:
    enabled: false
    base_url: "https://gotify.example.com"
    token: "your-app-token"

  # matrix sends alerts to a Matrix room.
  matrix:
    enabled: false
    homeserver: "https://matrix.example.com"
    access_token: "your-access-token"
    room_id: "!roomid:example.com"

  # zulip sends alerts to a Zulip stream.
  zulip:
    enabled: false
    base_url: "https://yourorg.zulipchat.com"
    bot_email: "vaultwatch-bot@yourorg.zulipchat.com"
    api_key: "your-zulip-api-key"
    stream: "ops-alerts"
    topic: "vault expiry"

  # pushover sends push notifications via Pushover.
  pushover:
    enabled: false
    app_token: "your-pushover-app-token"
    user_key: "your-pushover-user-key"

  # lark sends alerts to Lark (Feishu) via incoming webhook.
  lark:
    enabled: false
    webhook_url: "https://open.larksuite.com/open-apis/bot/v2/hook/..."

  # pagertree sends alerts to PagerTree.
  pagertree:
    enabled: false
    webhook_url: "https://pagertree.com/api/v3/alerts"

  # linear creates Linear issues for expiring secrets.
  linear:
    enabled: false
    api_key: "your-linear-api-key"
    team_id: "your-team-id"

  # httpget fires a plain HTTP GET request with alert details as query params.
  httpget:
    enabled: false
    url: "https://example.com/alert"

  # grafana sends annotations to a Grafana instance.
  grafana:
    enabled: false
    url: "https://grafana.example.com"
    api_key: "your-grafana-api-key"

  # campfire sends alerts to a Basecamp Campfire room.
  campfire:
    enabled: false
    account_id: "your-account-id"
    campfire_id: "your-campfire-id"
    token: "your-api-token"

  # ntfy sends push notifications via ntfy.sh or a self-hosted ntfy server.
  ntfy:
    enabled: false
    base_url: "https://ntfy.sh"
    topic: "vaultwatch"

  # bearychat sends alerts to BearyChat via incoming webhook.
  bearychat:
    enabled: false
    webhook_url: "https://hook.bearychat.com/..."

  # signl4 sends alerts to SIGNL4 for mobile alerting.
  signl4:
    enabled: false
    webhook_url: "https://connect.signl4.com/webhook/..."

  # googlepubsub publishes alerts to a Google Cloud Pub/Sub topic.
  googlepubsub:
    enabled: false
    project_id: "your-gcp-project"
    topic_id: "vaultwatch-alerts"

  # file appends alerts to a local log file.
  file:
    enabled: false
    path: "/var/log/vaultwatch/alerts.log"

  # exec runs an external command for each alert.
  exec:
    enabled: false
    command: "/usr/local/bin/handle-vault-alert.sh"
    timeout: "10s"

  # statuspage updates a Statuspage.io component status.
  statuspage:
    enabled: false
    page_id: "your-page-id"
    component_id: "your-component-id"
    api_key: "your-statuspage-api-key"

  # amplitude tracks alert events in Amplitude analytics.
  amplitude:
    enabled: false
    api_key: "your-amplitude-api-key"

  # xmpp sends alerts via an XMPP gateway HTTP endpoint.
  xmpp:
    enabled: false
    gateway_url: "https://xmpp-gateway.example.com/send"
    recipient: "ops@example.com"

  # freshservice creates Freshservice tickets for expiring secrets.
  freshservice:
    enabled: false
    base_url: "https://yourorg.freshservice.com"
    api_key: "your-freshservice-api-key"
    reporter_email: "vaultwatch@example.com"

  # signalwire sends SMS alerts via SignalWire.
  signalwire:
    enabled: false
    space_url: "https://yourspace.signalwire.com"
    project_id: "your-project-id"
    api_token: "your-api-token"
    from: "+15551234567"
    to: "+15559876543"
